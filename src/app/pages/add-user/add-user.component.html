<section class="form-page">
  <h1>Add User</h1>

  <form [formGroup]="addUserForm" (ngSubmit)="addUser()" class="form-card">
    <label for="firstName">First Name</label>
    <input
      id="firstName"
      formControlName="firstName"
      [class.input-error]="showFirstNameError"
      placeholder="Enter first name"
      required
    />
    @if (showFirstNameError) {
      <p class="field-error">{{ firstNameErrorMessage }}</p>
    }

    <label for="email">Email Address</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      [class.input-error]="showEmailError"
      placeholder="Enter email address"
      required
    />
    @if (showEmailError) {
      <p class="field-error">{{ emailErrorMessage }}</p>
    }

    <label for="password">Password</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      [class.input-error]="showPasswordError"
      placeholder="Enter password"
      required
    />
    @if (showPasswordError) {
      <p class="field-error">{{ passwordErrorMessage }}</p>
    }

    <label for="role">Role</label>
    <select id="role" formControlName="role" required>
      @for (roleOption of roleOptions; track roleOption) {
        <option [value]="roleOption">{{ roleOption }}</option>
      }
    </select>

    <div class="actions">
      <button type="submit">Add User</button>
      <a routerLink="/">Cancel</a>
    </div>
  </form>
</section>
